<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Study Planner Pro V2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Smart Study Planner Pro V2</h1>

<div id="quoteBox" class="quote"></div>

<button class="darkToggle" onclick="toggleDark()">Toggle Dark Mode</button>

<label>Class:</label>
<select id="class">
<option>9th</option>
<option>10th</option>
<option>11th</option>
<option>12th</option>
<option>College</option>
</select>

<label>Competitive Exam?</label>
<select id="competitive" onchange="toggleExam()">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<div id="examSection" class="hidden">
<label>Which Exam?</label>
<select id="exam">
<option>JEE</option>
<option>NEET</option>
<option>UPSC</option>
<option>SSC</option>
<option>Banking</option>
<option>CUET</option>
</select>
</div>

<label>Daily Free Hours:</label>
<input type="number" id="hours">

<hr>

<h3>Add Subjects</h3>

<input type="text" id="subjectName" placeholder="Subject Name">

<select id="strength">
<option value="1">Strong</option>
<option value="1.5">Medium</option>
<option value="2">Weak</option>
</select>

<button onclick="addSubject()">Add Subject</button>

<div id="subjectList" class="subjectBox hidden"></div>

<hr>

<h3>Free Time Slots</h3>

<input type="text" id="morning" placeholder="Morning (6-8)">
<input type="text" id="afternoon" placeholder="Afternoon (4-6)">
<input type="text" id="night" placeholder="Night (8-10)">

<button onclick="generatePlan()">Generate Smart Plan</button>

<div id="output" class="result hidden"></div>
<div id="routineOutput" class="result hidden"></div>

<div id="scoreSection" class="scoreBox hidden"></div>

<button onclick="downloadRoutine()" id="downloadBtn" class="hidden">
Download Routine
</button>

</div>

<script src="script.js"></script>
</body>
</html>
